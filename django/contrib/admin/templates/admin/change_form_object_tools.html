{% load i18n admin_urls %}
{% block object-tools-items %}
  {% for object_tool in change_form_object_tools %}
    {% if object_tool %}
      <li>
        <a href="{% if object_tool.preserve_filters %}{% add_preserved_filters object_tool.url is_popup to_field %}{% else %}{{ object_tool.url }}{% endif %}" class="{{ object_tool.classes }}">{{ object_tool.label }}</a>
      </li>
    {% endif %}
  {% endfor %}
{% endblock %}
