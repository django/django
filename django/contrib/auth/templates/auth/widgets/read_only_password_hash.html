{% load i18n %}<div class="read-only-password"{% include 'django/forms/widgets/attrs.html' %}>
  <div>
    {% for entry in summary %}
    <strong>{{ entry.label }}</strong>{% if entry.value %}: <bdi>{{ entry.value }}</bdi>{% endif %}
    {% endfor %}
  </div>
  <div>
    <a class="button change-password-btn" href="{{ password_url|default:"../password/" }}">{% if usable_password %}{% translate "Change or unset password" %}{% else %}{% translate "Set password" %}{% endif %}</a>
  </div>
</div>
