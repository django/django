name: New contributor message

on:
  pull_request_target:
    types: [opened]
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    # Only trigger on the main Django repository
    if: github.repository == 'django/django'
    name: Hello new contributor
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Pin to v1: https://github.com/actions/first-interaction/issues/369
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hello! Thank you for your interest in Django 💪

            Django issues are tracked in [Trac](https://code.djangoproject.com/) and not in this repo.
          pr-message: |
            Hello! Thank you for your contribution 💪

            As it's your first contribution be sure to check out the [patch review checklist](https://docs.djangoproject.com/en/dev/internals/contributing/writing-code/submitting-patches/#patch-review-checklist).

            If you're fixing a ticket [from Trac](https://code.djangoproject.com/) make sure to set the _"Has patch"_ flag and include a link to this PR in the ticket!

            If you have any design or process questions then you can ask in the [Django forum](https://forum.djangoproject.com/c/internals/5).

            Welcome aboard ⛵️!

            ---

            Please be aware that Django is a volunteer-driven project and the [queue of PRs](https://dashboard.djangoproject.com/#:~:text=Patches) is long. This means feedback can take weeks or months. In the meantime, there are other impactful ways to contribute beyond this repository:

            - [Review other open PRs](https://code.djangoproject.com/query?status=!closed&needs_better_patch=0&needs_tests=0&needs_docs=0&has_patch=1&stage=Accepted&desc=1&order=changetime)
            - Contribute to packages in the [Django ecosystem](https://www.djangoproject.com/community/ecosystem/)
            - Explore [other opportunities to contribute](https://djangonaut.space/contribute/opportunities/) to the Django community.
